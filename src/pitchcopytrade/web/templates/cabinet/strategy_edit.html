{% extends "cabinet/layout.html" %}

{% block content %}
<div style="max-width:640px;">
  <div style="display:flex;gap:16px;align-items:center;margin-bottom:24px;">
    <a href="/cabinet/strategies" style="color:var(--muted);font-size:0.9rem;">← Стратегии</a>
    <h2 style="margin:0;">{{ strategy.title }}</h2>
  </div>

  {% if error %}
  <div style="margin-bottom:16px;padding:14px 16px;border-radius:16px;background:rgba(191,23,54,0.08);color:var(--red-600);font-weight:600;">{{ error }}</div>
  {% endif %}

  <section class="surface" style="padding:28px;border-radius:24px;">
    <form method="post" action="/cabinet/strategies/{{ strategy.id }}/edit" style="display:grid;gap:16px;">
      <label style="display:grid;gap:6px;font-weight:600;">
        Название <input name="title" value="{{ strategy.title }}" required style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;" />
      </label>
      <label style="display:grid;gap:6px;font-weight:600;">
        Краткое описание
        <textarea name="short_description" rows="3" style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;resize:vertical;">{{ strategy.short_description }}</textarea>
      </label>
      <label style="display:grid;gap:6px;font-weight:600;">
        Уровень риска
        <select name="risk_level" style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;">
          <option value="low" {% if strategy.risk_level.value == 'low' %}selected{% endif %}>Низкий</option>
          <option value="medium" {% if strategy.risk_level.value == 'medium' %}selected{% endif %}>Средний</option>
          <option value="high" {% if strategy.risk_level.value == 'high' %}selected{% endif %}>Высокий</option>
        </select>
      </label>
      <label style="display:grid;gap:6px;font-weight:600;">
        Мин. капитал (руб.)
        <input name="min_capital_rub" type="number" value="{{ strategy.min_capital_rub or '' }}" style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;" />
      </label>
      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="action">Сохранить</button>
        <a href="/cabinet/strategies" class="action ghost">Отмена</a>
      </div>
    </form>
  </section>
</div>
{% endblock %}
