{% extends "cabinet/layout.html" %}

{% block content %}
<div style="display:grid;gap:24px;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h2 style="margin:0;">Стратегии</h2>
    <button onclick="document.getElementById('new-strategy-form').style.display='block'" class="action">+ Создать</button>
  </div>

  <div id="new-strategy-form" style="display:none;" class="surface" style="padding:24px;">
    <div style="padding:24px;">
      <h3 style="margin:0 0 16px;">Новая стратегия</h3>
      <form method="post" action="/cabinet/strategies" style="display:grid;gap:14px;">
        <label style="display:grid;gap:6px;font-weight:600;">
          Название <input name="title" required style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;" />
        </label>
        <label style="display:grid;gap:6px;font-weight:600;">
          Краткое описание <input name="short_description" style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;" />
        </label>
        <label style="display:grid;gap:6px;font-weight:600;">
          Уровень риска
          <select name="risk_level" style="padding:10px 14px;border-radius:12px;border:1px solid var(--line);font:inherit;">
            <option value="low">Низкий</option>
            <option value="medium" selected>Средний</option>
            <option value="high">Высокий</option>
          </select>
        </label>
        <div style="display:flex;gap:12px;">
          <button type="submit" class="action">Создать</button>
          <button type="button" onclick="document.getElementById('new-strategy-form').style.display='none'" class="action ghost">Отмена</button>
        </div>
      </form>
    </div>
  </div>

  {% if strategies %}
  <section class="surface" style="padding:0;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="border-bottom:2px solid var(--line);">
          <th style="text-align:left;padding:12px 16px;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Название</th>
          <th style="text-align:left;padding:12px 16px;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Статус</th>
          <th style="padding:12px 16px;"></th>
        </tr>
      </thead>
      <tbody>
        {% for strategy in strategies %}
        <tr style="border-bottom:1px solid var(--line);">
          <td style="padding:14px 16px;font-weight:600;">
            <a href="/cabinet/strategies/{{ strategy.id }}/recommendations">{{ strategy.title }}</a>
          </td>
          <td style="padding:14px 16px;">
            <span class="pill">{{ strategy.status.value }}</span>
          </td>
          <td style="padding:14px 16px;">
            <a href="/cabinet/strategies/{{ strategy.id }}/edit" class="action ghost" style="padding:6px 14px;font-size:0.85rem;">Изменить</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
  {% else %}
  <div style="padding:40px;text-align:center;color:var(--muted);">Нет стратегий</div>
  {% endif %}
</div>
{% endblock %}
