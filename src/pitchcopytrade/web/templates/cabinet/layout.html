<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
      :root {
        --bg: #eef3fb;
        --surface: rgba(255,255,255,0.9);
        --line: rgba(16,39,115,0.12);
        --ink: #102773;
        --muted: #61719b;
        --blue-700: #102773;
        --blue-500: #1455d8;
        --red-600: #bf1736;
        --shadow: 0 28px 80px rgba(16,39,115,0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next","Montserrat","Segoe UI",sans-serif;
        background: linear-gradient(180deg,#eef3fb 0%,#f8fbff 100%);
        color: var(--ink);
        display: grid;
        grid-template-columns: 220px 1fr;
        grid-template-rows: auto 1fr;
      }
      a { color: inherit; text-decoration: none; }
      .topbar {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        background: rgba(255,255,255,0.9);
        border-bottom: 1px solid var(--line);
      }
      .brand { font-weight: 800; font-size: 1.1rem; color: var(--blue-700); }
      .sidebar {
        padding: 24px 16px;
        border-right: 1px solid var(--line);
        background: rgba(255,255,255,0.6);
      }
      .sidebar a {
        display: block;
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 600;
        margin-bottom: 4px;
        transition: background 0.15s;
      }
      .sidebar a:hover, .sidebar a.active { background: rgba(20,56,166,0.08); }
      .main-content { padding: 32px 28px; }
      .surface {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 24px;
        box-shadow: var(--shadow);
      }
      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg,var(--blue-700),var(--blue-500));
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        text-decoration: none;
      }
      .ghost {
        background: transparent;
        color: var(--blue-700);
        border: 1px solid rgba(20,56,166,0.2);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(20,56,166,0.08);
        color: var(--blue-700);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .muted { color: var(--muted); }
      @media (max-width: 700px) {
        body { grid-template-columns: 1fr; }
        .sidebar { display: none; }
        .main-content { padding: 16px; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">PitchCopyTrade</span>
      <div style="display:flex;align-items:center;gap:12px;">
        {% if author %}<span class="muted">{{ author.display_name }}</span>{% endif %}
        <a href="/logout" class="action ghost" style="padding:7px 16px;font-size:0.9rem;">Выйти</a>
      </div>
    </header>
    <nav class="sidebar">
      <a href="/cabinet/strategies" class="{% if active_nav == 'strategies' %}active{% endif %}">Стратегии</a>
    </nav>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
    {% include "components/ticker_picker.html" %}
  </body>
</html>
