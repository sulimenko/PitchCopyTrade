<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{{ title }}</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin: 0; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .entry-shell { text-align: center; padding: 32px 24px; }
    .entry-logo { font-size: 40px; font-weight: 800; color: #224a7a; letter-spacing: -1px; margin-bottom: 8px; }
    .entry-sub { color: #667487; font-size: 14px; margin-bottom: 32px; }
    .entry-spinner { width: 28px; height: 28px; border: 3px solid #dde4ec; border-top-color: #224a7a; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .entry-fallback { display: none; flex-direction: column; gap: 12px; }
    .entry-btn { display: inline-block; padding: 12px 28px; background: #224a7a; color: #fff; border-radius: 10px; text-decoration: none; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
<div class="entry-shell">
  <div class="entry-logo">PC</div>
  <div class="entry-sub">PitchCopyTrade</div>
  <div id="spinner" class="entry-spinner"></div>
  <div id="fallback" class="entry-fallback">
    <a class="entry-btn" href="{{ login_url }}">Войти через Telegram</a>
  </div>
</div>
<script>
(function () {
  var webApp = window.Telegram && window.Telegram.WebApp;

  function showFallback() {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("fallback").style.display = "flex";
  }

  if (webApp && webApp.initData) {
    webApp.ready();
    var timezone = "Europe/Moscow";
    try { timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || timezone; } catch (e) {}
    var body = new URLSearchParams();
    body.set("init_data", webApp.initData);
    body.set("next", "/app/catalog");
    body.set("timezone_name", timezone);
    fetch("/tg-webapp/auth", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      credentials: "same-origin",
      body: body.toString()
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        // Y4: Validate redirect URL to prevent open redirect attacks
        var redirectUrl = data.redirect_url || "/app/catalog";
        if (!redirectUrl || !redirectUrl.startsWith("/") || redirectUrl.startsWith("//") || redirectUrl.startsWith("/\\")) {
          redirectUrl = "/app/catalog";
        }
        window.location.href = redirectUrl;
      })
      .catch(showFallback);
  } else {
    showFallback();
  }
})();
</script>
</body>
</html>
