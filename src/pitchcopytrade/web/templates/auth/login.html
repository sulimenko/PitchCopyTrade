{% extends "base.html" %}

{% block content %}
<section class="surface" style="max-width:400px;margin:60px auto;padding:40px;text-align:center;">
  {% if error %}
  <div style="margin-bottom:20px;padding:14px 16px;border-radius:18px;background:rgba(191,23,54,0.08);color:var(--red-600);font-weight:600;">
    {{ error }}
  </div>
  {% endif %}
  <div class="brand-mark" style="margin:0 auto 24px;width:64px;height:64px;font-size:1.1rem;">PC</div>
  <h2 style="margin:0 0 28px;font-size:1.6rem;">PitchCopyTrade</h2>
  <script async src="https://telegram.org/js/telegram-widget.js?22"
    data-telegram-login="{{ bot_username }}"
    data-size="large"
    data-auth-url="/auth/telegram/callback"
    data-request-access="write">
  </script>
</section>
{% endblock %}
