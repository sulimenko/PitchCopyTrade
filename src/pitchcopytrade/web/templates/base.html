<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #eef3fb;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-strong: #ffffff;
        --line: rgba(16, 39, 115, 0.12);
        --ink: #102773;
        --muted: #61719b;
        --blue-700: #102773;
        --blue-500: #1455d8;
        --red-600: #bf1736;
        --shadow: 0 28px 80px rgba(16, 39, 115, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Montserrat", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(20, 56, 166, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(191, 23, 54, 0.09), transparent 24%),
          linear-gradient(180deg, #eef3fb 0%, #f8fbff 100%);
        color: var(--ink);
      }

      a { color: inherit; text-decoration: none; }

      .page-shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        margin-bottom: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.08em;
        box-shadow: 0 18px 38px rgba(20, 56, 166, 0.24);
      }

      .eyebrow {
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.74rem;
        font-weight: 700;
      }

      .surface {
        border: 1px solid var(--line);
        background: var(--surface);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .muted { color: var(--muted); }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(20, 56, 166, 0.08);
        color: var(--blue-700);
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
        color: #fff;
        cursor: pointer;
        font: inherit;
      }

      .ghost {
        background: transparent;
        color: var(--blue-700);
        border: 1px solid rgba(20, 56, 166, 0.16);
      }

      @media (max-width: 760px) {
        .page-shell {
          width: calc(100% - 20px);
          padding: 18px 0 36px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">PC</div>
          <div>
            <div class="eyebrow">PitchCopyTrade</div>
            <strong>Авторские стратегии и подписки</strong>
          </div>
        </div>
        {% block topbar_actions %}{% endblock %}
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
  </html>
