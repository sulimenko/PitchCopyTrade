services:
  api:
    build:
      context: ..
    container_name: pct-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INSTRUMENT_QUOTE_PROVIDER_ENABLED: "true"
    command: uvicorn pitchcopytrade.api.main:app --host 0.0.0.0 --port 8000
#    ports:
#      - "127.0.0.1:8110:8000"
    volumes:
      - ../storage:/data/storage:Z
      - ../doc:/doc:ro
    networks: 
      ptfin-backend:
        aliases:
          - pct-api.ptfin.local

  bot:
    build:
      context: ..
    container_name: pct-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INSTRUMENT_QUOTE_PROVIDER_ENABLED: "true"
    command: python -m pitchcopytrade.bot.main
    volumes:
      - ../storage:/data/storage:Z
    networks:
      ptfin-backend:
        aliases:
          - pct-bot.ptfin.local

  worker:
    build:
      context: ..
    container_name: pct-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INSTRUMENT_QUOTE_PROVIDER_ENABLED: "true"
    command: python -m pitchcopytrade.worker.main
    volumes:
      - ../storage:/data/storage:Z
      - ../doc:/doc:ro
    networks:
      ptfin-backend:
        aliases:
          - pct-worker.ptfin.local

networks:
  ptfin-backend:
    external: true
    name: ptfin-backend
