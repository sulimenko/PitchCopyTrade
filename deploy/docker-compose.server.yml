services:
  api:
    build:
      context: ..
    container_name: pct-api
    restart: unless-stopped
    env_file:
      - ../.env.server
    command: uvicorn pitchcopytrade.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8110:8000"
    volumes:
      - ../storage:/data/storage:Z
    networks:
      - pct_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bot:
    build:
      context: ..
    container_name: pct-bot
    restart: unless-stopped
    env_file:
      - ../.env.server
    command: python -m pitchcopytrade.bot.main
    volumes:
      - ../storage:/data/storage:Z
    networks:
      - pct_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ..
    container_name: pct-worker
    restart: unless-stopped
    env_file:
      - ../.env.server
    command: python -m pitchcopytrade.worker.main
    volumes:
      - ../storage:/data/storage:Z
    networks:
      - pct_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  pct_net:
    driver: bridge
