services:
  api:
    build: .
    env_file:
      - .env
    command: uvicorn pitchcopytrade.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  bot:
    build: .
    env_file:
      - .env
    command: python -m pitchcopytrade.bot.main
    expose:
      - "8080"
    volumes:
      - .:/app

  worker:
    build: .
    env_file:
      - .env
    command: python -m arq pitchcopytrade.worker.arq_worker.WorkerSettings
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
