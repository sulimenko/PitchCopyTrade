services:
  api:
    build: .
    env_file:
      - .env
    command: uvicorn pitchcopytrade.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - minio
      - minio-init

  bot:
    build: .
    env_file:
      - .env
    command: python -m pitchcopytrade.bot.main
    volumes:
      - .:/app
    depends_on:
      - postgres

  worker:
    build: .
    env_file:
      - .env
    command: python -m pitchcopytrade.worker.main
    volumes:
      - .:/app
    depends_on:
      - postgres
      - minio

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET_UPLOADS};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
